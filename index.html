<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f5" />
  <script>
    // Apply the saved (or system) theme before paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem('contraction-timer.theme');
        if (t !== 'light' && t !== 'dark') t = 'light';   // default to light; dark only via the toggle
        document.documentElement.dataset.theme = t;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = t === 'dark' ? '#0a0a0a' : '#f5f5f5';
      } catch (e) {}
    })();
  </script>

  <script>
    // Register the service worker for offline support (only works over http(s), not file://).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>

    };
    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const INFO = {
      freq:     { title: 'Frequency', body: 'Contractions occur regularly every 5 minutes or less. This is measured from the start of one contraction to the start of the next.' },
      duration: { title: 'Duration',  body: 'Each contraction lasts for about 60 seconds. This means your uterus is contracting hard enough and long enough to dilate the cervix.' },
      count:    { title: 'Timeline',  body: 'This steady pattern (5 minutes apart, 1 minute long) has been consistent and continuous for a full 60 minutes without stopping.' },

    const BTN_OUTLINE = 'rounded-full border border-line text-body font-bold text-lg py-4 hover:bg-surface active:scale-[.99] transition';
    const ICON_BTN = 'grid place-items-center rounded-lg text-muted hover:text-ink hover:bg-surface transition';

    // Inlined Iconoir SVGs (self-hosted — replaces the 2.9MB icon-font CDN). Sized via font-size (1em); color via currentColor.

      'trash': '<path d="M20 9L18.005 20.3463C17.8369 21.3026 17.0062 22 16.0353 22H7.96474C6.99379 22 6.1631 21.3026 5.99496 20.3463L4 9" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 6L15.375 6M3 6L8.625 6M8.625 6V4C8.625 2.89543 9.52043 2 10.625 2H13.375C14.4796 2 15.375 2.89543 15.375 4V6M8.625 6L15.375 6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',

      'sun-light': '<path d="M12 18C15.3137 18 18 15.3137 18 12C18 8.68629 15.3137 6 12 6C8.68629 6 6 8.68629 6 12C6 15.3137 8.68629 18 12 18Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 12L23 12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2V1" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 23V22" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 20L19 19" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 4L19 5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20L5 19" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 4L5 5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 12L2 12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
      'emoji-look-up': '<path d="M8.5 7C8.22386 7 8 6.77614 8 6.5C8 6.22386 8.22386 6 8.5 6C8.77614 6 9 6.22386 9 6.5C9 6.77614 8.77614 7 8.5 7Z" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.5 7C15.2239 7 15 6.77614 15 6.5C15 6.22386 15.2239 6 15.5 6C15.7761 6 16 6.22386 16 6.5C16 6.77614 15.7761 7 15.5 7Z" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11H14M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
      'emoji-really': '<path d="M10 9H8M16 9H14M15 15H9M2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
      'emoji-sad': '<path d="M8.5 9C8.22386 9 8 8.77614 8 8.5C8 8.22386 8.22386 8 8.5 8C8.77614 8 9 8.22386 9 8.5C9 8.77614 8.77614 9 8.5 9Z" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.5 9C15.2239 9 15 8.77614 15 8.5C15 8.22386 15.2239 8 15.5 8C15.7761 8 16 8.22386 16 8.5C16 8.77614 15.7761 9 15.5 9Z" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.5 15.5C7.5 15.5 9 13.5 12 13.5C15 13.5 16.5 15.5 16.5 15.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
      'upload': '<path d="M6 20L18 20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 16V4M12 4L15.5 7.5M12 4L8.5 7.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
      'copy': '<path d="M19.4 20H9.6C9.26863 20 9 19.7314 9 19.4V9.6C9 9.26863 9.26863 9 9.6 9H19.4C19.7314 9 20 9.26863 20 9.6V19.4C20 19.7314 19.7314 20 19.4 20Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 9V4.6C15 4.26863 14.7314 4 14.4 4H4.6C4.26863 4 4 4.26863 4 4.6V14.4C4 14.7314 4.26863 15 4.6 15H9" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
      'download': '<path d="M6 20L18 20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 4V16M12 16L15.5 12.5M12 16L8.5 12.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
      'archive': '<path d="M7 6L17 6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 9L17 9" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 17H15" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 12H2.6C2.26863 12 2 12.2686 2 12.6V21.4C2 21.7314 2.26863 22 2.6 22H21.4C21.7314 22 22 21.7314 22 21.4V12.6C22 12.2686 21.7314 12 21.4 12H21M3 12V2.6C3 2.26863 3.26863 2 3.6 2H20.4C20.7314 2 21 2.26863 21 2.6V12M3 12H21" stroke="currentColor" stroke-width="1.5"/>',
      'folder': '<path d="M2 11V4.6C2 4.26863 2.26863 4 2.6 4H8.77805C8.92127 4 9.05977 4.05124 9.16852 4.14445L12.3315 6.85555C12.4402 6.94876 12.5787 7 12.722 7H21.4C21.7314 7 22 7.26863 22 7.6V11M2 11V19.4C2 19.7314 2.26863 20 2.6 20H21.4C21.7314 20 22 19.7314 22 19.4V11M2 11H22" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
    };
    function Icon({ name, class: cls = '' }) {
      return html`<svg class=${cls} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke-width="1.5" dangerouslySetInnerHTML=${{ __html: ICONS[name] || '' }}></svg>`;
    }

    // ---- Persistence ----
    function load() {
      try {
        const data = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
        return {
          contractions: (Array.isArray(data.contractions) ? data.contractions : [])
            .filter((c) => c && Number.isFinite(c.start) && Number.isFinite(c.end))
            .sort((a, b) => b.start - a.start),
          activeStart: Number.isFinite(data.activeStart) ? data.activeStart : null,
          selectedIntensity: [1, 2, 3].includes(data.selectedIntensity) ? data.selectedIntensity : 1,
          archives: Array.isArray(data.archives) ? data.archives : [],
        };
      } catch { return { contractions: [], activeStart: null, selectedIntensity: 1, archives: [] }; }
    }

    // ---- Formatting ----
    function fmtClock(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
    }
    function fmtDur(ms) {
      const s = Math.round(ms / 1000);
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60), r = s % 60;
      return r ? `${m}m ${r}s` : `${m}m`;
    }
    function fmtGap(ms) {
      const s = Math.round(ms / 1000);
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ${s % 60}s`;
      const h = Math.floor(m / 60);
      if (h < 24) { const rm = m % 60; return rm ? `${h}h ${rm}m` : `${h}h`; }
      const d = Math.floor(h / 24), rh = h % 24;
      return rh ? `${d}d ${rh}h` : `${d}d`;
    }
    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    function dayKey(ts) {
      const d = new Date(ts);
      return d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    }
    function fmtDay(ts) {
      const d = new Date(ts);
      const sod = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
      const diff = Math.round((sod(new Date()) - sod(d)) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function fmtArchiveDate(ts) {
      return new Date(ts).toLocaleString([], { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
    }
    function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

    // ---- Stats / 5-1-1 ----
    function recentStats(contractions) {
      const cutoff = Date.now() - HOUR;
      const recent = contractions.filter((c) => c.start >= cutoff);
      const durs = recent.map((c) => c.end - c.start);
      const avgDur = durs.length ? durs.reduce((a, b) => a + b, 0) / durs.length : null;
      const chrono = [...recent].sort((a, b) => a.start - b.start);
      const gaps = [];
      for (let i = 1; i < chrono.length; i++) gaps.push(chrono[i].start - chrono[i - 1].start);
      const avgGap = gaps.length ? gaps.reduce((a, b) => a + b, 0) / gaps.length : null;
      const span = chrono.length ? chrono[chrono.length - 1].start - chrono[0].start : 0;
      return { avgDur, avgGap, count: recent.length, span };
    }
    function check511(s) {
      return s.count >= 4 && s.span >= 50 * 60000
        && s.avgGap != null && s.avgGap <= 5.5 * 60000
        && s.avgDur != null && s.avgDur >= 45000;
    }

    // ---- Stateless components ----
    function Modal({ z = 'z-40', onClose, children }) {
      return html`
        <div class=${'fixed inset-0 ' + z + ' flex items-end sm:items-center justify-center'}>
          <div class="absolute inset-0 bg-neutral-900/30 backdrop-blur-sm" onClick=${onClose}></div>
          ${children}
        </div>`;
    }
    const PANEL = 'relative w-full max-w-md bg-card rounded-t-3xl sm:rounded-3xl border border-line shadow-xl';
    const PANEL_PAD = 'padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));';

    function SettingsRow({ icon, title, sub, danger, onClick }) {
      const tone = danger ? 'border-danger/40 hover:bg-danger/10' : 'border-line hover:bg-surface';
      return html`<button onClick=${onClick} class=${'w-full flex items-center gap-3 rounded-2xl border px-4 py-3 text-left transition ' + tone}>
        <${Icon} name=${icon} class=${'text-xl shrink-0 ' + (danger ? 'text-danger' : 'text-body')} />
        <div class="flex-1 min-w-0">
          <div class=${'text-sm font-semibold ' + (danger ? 'text-danger' : 'text-ink')}>${title}</div>
          <div class=${'text-xs ' + (danger ? 'text-danger/80' : 'text-muted')}>${sub}</div>
        </div>
      </button>`;
    }

    // ---- App ----
    class App extends Component {
      constructor() {
        super();
        const s = load();
        const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
        this.state = { ...s, theme, elapsed: 0, modal: null, edit: null, confirm: null, infoKey: null, copied: false };
        this.ticker = null;
        this.fileInput = null;
      }

      componentDidMount() {
        if (this.state.activeStart != null) this.startTimer();
        // Re-evaluate the rolling 5-1-1 window while idle.
        this.idle = setInterval(() => { if (this.state.activeStart == null) this.forceUpdate(); }, 30000);
      }
      componentWillUnmount() { this.stopTimer(); clearInterval(this.idle); }

      componentDidUpdate(_, prev) {
        const keys = ['contractions', 'activeStart', 'selectedIntensity', 'archives'];
        if (keys.some((k) => prev[k] !== this.state[k])) {
          try {
            const { contractions, activeStart, selectedIntensity, archives } = this.state;
            localStorage.setItem(STORE_KEY, JSON.stringify({ contractions, activeStart, selectedIntensity, archives }));
          } catch {}
        }
      }

      // ---- Timer ----
      startTimer = () => {
        this.stopTimer();
        const update = () => this.setState({ elapsed: Date.now() - this.state.activeStart });
        this.ticker = setInterval(update, 200);
        update();
      };
      stopTimer = () => { if (this.ticker) { clearInterval(this.ticker); this.ticker = null; } };
      toggle = () => {
        if (this.state.activeStart == null) {
          this.setState({ activeStart: Date.now(), elapsed: 0 }, this.startTimer);
        } else {
          const start = this.state.activeStart, end = Date.now();
          this.stopTimer();
          const cs = [...this.state.contractions, { start, end, intensity: this.state.selectedIntensity }]
            .sort((a, b) => b.start - a.start);
          this.setState({ contractions: cs, activeStart: null, elapsed: 0 });
        }
      };
      cycleIntensity = () => this.setState({ selectedIntensity: (this.state.selectedIntensity % 3) + 1 });
      toggleTheme = () => {
        const theme = this.state.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = theme;
        const m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = theme === 'dark' ? '#0a0a0a' : '#f5f5f5';
        try { localStorage.setItem('contraction-timer.theme', theme); } catch {}
        this.setState({ theme });
      };

      // ---- Confirm ----
      openConfirm = (opts) => this.setState({ confirm: opts });
      closeConfirm = () => this.setState({ confirm: null });

      // ---- Edit / Add ----
      buildEdit = (ts, isNew, index, durSec, level) => {
        const d = new Date(ts), nowY = new Date().getFullYear(), dY = d.getFullYear();
        const minY = Math.min(nowY - 2, dY), maxY = Math.max(nowY, dY);
        const years = []; for (let y = maxY; y >= minY; y--) years.push(y);
        return {
          isNew, index, years, ms: d.getMilliseconds(),
          month: d.getMonth(), day: d.getDate(), year: dY,
          hour: ((d.getHours() + 11) % 12) + 1, minute: d.getMinutes(), second: d.getSeconds(),
          ampm: d.getHours() < 12 ? 'AM' : 'PM',
          durMin: Math.floor(durSec / 60), durSec: durSec % 60, level,
        };
      };
      openAdd = () => this.setState({ modal: 'edit', edit: this.buildEdit(Date.now(), true, -1, 60, this.state.selectedIntensity) });
      openEdit = (i) => {
        const c = this.state.contractions[i];
        if (!c) return;
        const durSec = Math.max(0, Math.round((c.end - c.start) / 1000));
        const level = [1, 2, 3].includes(c.intensity) ? c.intensity : 1;
        this.setState({ modal: 'edit', edit: this.buildEdit(c.start, false, i, durSec, level) });
      };
      closeEdit = () => this.setState({ modal: null, edit: null });
      setEdit = (patch) => this.setState({ edit: { ...this.state.edit, ...patch } });
      setToday = () => { const d = new Date(); this.setEdit({ month: d.getMonth(), day: d.getDate(), year: d.getFullYear() }); };
      saveEdit = () => {
        const e = this.state.edit, clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
        const year = +e.year, month = +e.month;
        const day = clamp(Math.floor(+e.day || 1), 1, daysInMonth(year, month));
        let hour = clamp(Math.floor(+e.hour || 12), 1, 12) % 12;
        if (e.ampm === 'PM') hour += 12;
        const minute = clamp(Math.floor(+e.minute || 0), 0, 59);
        const second = clamp(Math.floor(+e.second || 0), 0, 59);
        const start = new Date(year, month, day, hour, minute, second, e.isNew ? 0 : e.ms).getTime();
        if (!Number.isFinite(start)) return;
        const dmin = Math.max(0, Math.floor(+e.durMin || 0)), dsec = Math.max(0, Math.floor(+e.durSec || 0));
        const rec = { start, end: start + (dmin * 60 + dsec) * 1000, intensity: e.level };
        const cs = (e.isNew
          ? [...this.state.contractions, rec]
          : this.state.contractions.map((c, j) => (j === e.index ? rec : c))
        ).sort((a, b) => b.start - a.start);
        this.setState({ contractions: cs, modal: null, edit: null });
      };

      askDelete = (i) => this.openConfirm({
        title: 'Delete this contraction?', message: "This can't be undone.", okLabel: 'Delete',
        onOk: () => this.setState({ contractions: this.state.contractions.filter((_, j) => j !== i) }),
      });

      // ---- Archive ----
      askArchive = () => {
        if (!this.state.contractions.length) return;
        const n = this.state.contractions.length;
        this.setState({ modal: null });
        this.openConfirm({
          title: `Archive ${n} contraction${n > 1 ? 's' : ''}?`,
          message: 'They’ll be saved as a group and the live list will start fresh from 01.',
          okLabel: 'Archive',
          onOk: () => this.setState({
            archives: [{ id: Date.now(), archivedAt: Date.now(), items: this.state.contractions }, ...this.state.archives],
            contractions: [],
          }),
        });
      };
      deleteArchive = (id) => this.openConfirm({
        title: 'Delete this archived group?', message: "This can't be undone.", okLabel: 'Delete',
        onOk: () => this.setState({ archives: this.state.archives.filter((g) => g.id !== id) }),
      });

      askClear = () => {
        if (!this.state.contractions.length && this.state.activeStart == null && !this.state.archives.length) return;
        this.setState({ modal: null });
        this.openConfirm({
          title: 'Clear all data?',
          message: 'All recorded contractions and archived groups will be removed. This cannot be undone.',
          okLabel: 'Clear all',
          onOk: () => { this.stopTimer(); this.setState({ contractions: [], archives: [], activeStart: null, elapsed: 0 }); },
        });
      };

      // ---- Export / Copy / Import ----
      buildJSON = () => JSON.stringify(
        { app: 'contraction-timer', version: 1, exportedAt: new Date().toISOString(), contractions: this.state.contractions }, null, 2);
      buildTSV = () => {
        const asc = [...this.state.contractions].sort((a, b) => a.start - b.start);
        const head = ['#', 'Start', 'Duration', 'Intensity', 'Apart'].join('\t');
        const lines = asc.map((c, i) => {
          const prev = asc[i - 1];
          const lvl = (LEVELS[c.intensity] || LEVELS[1]).label;
          return [String(i + 1).padStart(2, '0'), new Date(c.start).toLocaleString(), fmtDur(c.end - c.start), lvl, prev ? fmtGap(c.start - prev.start) : ''].join('\t');
        });
        return [head, ...lines].join('\n');
      };
      buildSummary = () => {
        const st = recentStats(this.state.contractions);
        const head = `Contraction log — ${this.state.contractions.length} total`;
        const sub = st.avgDur != null
          ? `Last hour: ${st.count}, avg ${fmtDur(st.avgDur)} long, ${st.avgGap != null ? fmtGap(st.avgGap) : '—'} apart` : '';
        return [head, sub, '', this.buildTSV()].filter(Boolean).join('\n');
      };
      exportData = async () => {
        if (!this.state.contractions.length) return;
        const json = this.buildJSON();
        const fname = 'contractions-' + new Date().toISOString().slice(0, 10) + '.json';
        const file = new File([json], fname, { type: 'application/json' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try { await navigator.share({ files: [file], title: 'Contraction log' }); return; }
          catch (e) { if (e && e.name === 'AbortError') return; }
        }
        const url = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
        const a = document.createElement('a');
        a.href = url; a.download = fname;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };
      copySummary = async () => {
        if (!this.state.contractions.length) return;
        const text = this.buildSummary();
        const done = () => { this.setState({ copied: true }); setTimeout(() => this.setState({ copied: false }), 1200); };
        try { await navigator.clipboard.writeText(text); done(); }
        catch {
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); done(); } catch {}
          ta.remove();
        }
      };
      onImportFile = (ev) => {
        const file = ev.target.files && ev.target.files[0];
        ev.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          let data;
          try { data = JSON.parse(reader.result); } catch { alert('Could not read that file.'); return; }
          const arr = Array.isArray(data) ? data : (data && Array.isArray(data.contractions) ? data.contractions : null);
          const clean = (arr || [])
            .filter((c) => c && Number.isFinite(c.start) && Number.isFinite(c.end))
            .map((c) => ({ start: c.start, end: c.end, intensity: [1, 2, 3].includes(c.intensity) ? c.intensity : 1 }))
            .sort((a, b) => b.start - a.start);
          if (!clean.length) { alert('No contractions found in that file.'); return; }
          this.setState({ modal: null });
          this.openConfirm({
            title: `Import ${clean.length} contraction${clean.length > 1 ? 's' : ''}?`,
            message: 'This replaces your current history.',
            okLabel: 'Import',
            onOk: () => this.setState({ contractions: clean }),
          });
        };
        reader.readAsText(file);
      };

      // ---- Renders ----
      renderStats(st) {
        const durMet = st.avgDur != null && st.avgDur >= 45000;
        const gapMet = st.avgGap != null && st.avgGap <= 5.5 * 60000;
        const spanMet = st.span >= 50 * 60000 && st.count >= 4;
        const col = (key, label, value, hint, ratio, met) => {
          const pct = (Math.max(0, Math.min(1, ratio || 0)) * 100).toFixed(0);
          return html`<div class="relative px-4 py-3.5">
            <button aria-label=${'About ' + label} onClick=${() => this.setState({ modal: 'info', infoKey: key })}
              class="absolute top-1.5 right-1.5 grid place-items-center h-6 w-6 rounded-full text-faint hover:text-ink hover:bg-surface transition">
              <${Icon} name="info-circle" class="text-sm" />
            </button>
            <div class="text-[11px] leading-tight pr-5 whitespace-nowrap">${label}</div>
            <div class="tnum text-base sm:text-xl font-bold mt-0.5 whitespace-nowrap">${value}</div>
            <div class="mt-3">
              <div class="h-1.5 rounded-full bg-track overflow-hidden">
                <div class=${'h-full rounded-full transition-all duration-500 ' + (met ? 'bg-emerald-500' : 'bg-body')} style=${'width:' + pct + '%'}></div>
              </div>
              <div class="text-[10px] text-muted leading-tight mt-1.5">${hint}</div>
            </div>
          </div>`;
        };
        return html`<section class="rounded-2xl bg-card border border-line/70 overflow-hidden">
          <div class="grid grid-cols-3 divide-x divide-line/70">
            ${col('freq', 'Frequency', st.avgGap != null ? fmtGap(st.avgGap) : '—', '≤5 min apart', st.avgGap != null ? (5 * 60000) / st.avgGap : 0, gapMet)}
            ${col('duration', 'Duration', st.avgDur != null ? fmtDur(st.avgDur) : '—', '1+ min long', st.avgDur != null ? st.avgDur / 60000 : 0, durMet)}
            ${col('count', 'Timeline', String(st.count), '1+ hour', st.span / HOUR, spanMet)}
          </div>
        </section>`;
      }

      renderHistory() {
        const cs = this.state.contractions;
        if (!cs.length) {
          return html`<section>
            <div class="rounded-2xl border border-dashed border-line bg-card/50 py-12 text-center">
              <${Icon} name="hourglass" class="text-3xl text-muted mx-auto" />
              <p class="text-sm text-muted mt-2">No contractions yet.<br/>Tap start when one begins.</p>
            </div>
          </section>`;
        }
        const nodes = [];
        let prevDay = null;
        cs.forEach((c, i) => {
          const day = dayKey(c.start);
          if (day !== prevDay) {
            nodes.push(html`<li key=${'d' + day} class=${'px-1 pb-1 text-xs font-semibold text-muted' + (prevDay === null ? '' : ' pt-3')}>${fmtDay(c.start)}</li>`);
            prevDay = day;
          }
          const older = cs[i + 1];
          const cfg = LEVELS[c.intensity] || LEVELS[1];
          const num = String(cs.length - i).padStart(2, '0');
          nodes.push(html`<li key=${'c' + c.start + '-' + i} class="row-in flex items-center gap-3 rounded-2xl bg-card border border-line/70 px-4 py-3">
            <span class="tnum text-xs font-semibold text-muted shrink-0">${num}</span>
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2">
                <span class="tnum font-semibold text-ink">${fmtDur(c.end - c.start)}</span>
                <span class=${'h-2 w-2 rounded-full border shrink-0 ' + cfg.fill}></span>
              </div>
              <div class="text-xs text-muted mt-0.5">${fmtTime(c.start)}</div>
            </div>
            <div class="flex items-center shrink-0 -mr-1">
              <button onClick=${() => this.openEdit(i)} class=${'h-8 w-8 ' + ICON_BTN}><${Icon} name="edit-pencil" class="text-lg" /></button>
              <button onClick=${() => this.askDelete(i)} class=${'h-8 w-8 ' + ICON_BTN}><${Icon} name="xmark" class="text-lg" /></button>
            </div>
          </li>`);
          if (older) {
            nodes.push(html`<li key=${'g' + c.start} class="flex items-center justify-center px-3">
              <span class="tnum text-[11px] font-medium text-muted">${fmtGap(c.start - older.start)}</span>
            </li>`);
          }
        });
        return html`<section><ul class="space-y-2">${nodes}</ul></section>`;
      }

      renderEdit() {
        const e = this.state.edit;
        const up = (k) => (ev) => this.setEdit({ [k]: ev.target.value });
        return html`<${Modal} z="z-30" onClose=${this.closeEdit}>
          <div class=${PANEL + ' p-6'} style=${PANEL_PAD}>
            <div class="flex items-center justify-between mb-5">
              <h3 class="text-base font-bold tracking-tight">${e.isNew ? 'Add contraction' : 'Edit contraction'}</h3>
              <button onClick=${this.closeEdit} class="grid place-items-center h-9 w-9 rounded-lg text-muted hover:text-ink hover:bg-surface transition"><${Icon} name="xmark" class="text-xl" /></button>
            </div>

            <div class="rounded-2xl border border-line/70 bg-surface p-4 space-y-3 mb-3">
              <div>
                <div class="flex items-center justify-between mb-1.5">
                  <label class="text-xs font-medium text-muted">Date</label>
                  <button type="button" onClick=${this.setToday} class="text-xs font-semibold text-brand-600 hover:text-brand-700 transition">Today</button>
                </div>
                <div class="grid grid-cols-3 gap-2">
                  <select class="picker" value=${e.month} onChange=${up('month')}>${MONTHS.map((m, i) => html`<option value=${i}>${m}</option>`)}</select>
                  <input type="number" min="1" max=${daysInMonth(+e.year, +e.month)} inputmode="numeric" class=${NUM_CLS} value=${e.day} onInput=${up('day')} />
                  <select class="picker" value=${e.year} onChange=${up('year')}>${e.years.map((y) => html`<option value=${y}>${y}</option>`)}</select>
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-muted mb-1.5">Time</label>
                <div class="flex items-center gap-1.5">
                  <input type="number" min="1" max="12" inputmode="numeric" class=${TIME_CLS} value=${e.hour} onInput=${up('hour')} />
                  <span class="text-sm font-semibold text-faint">:</span>
                  <input type="number" min="0" max="59" inputmode="numeric" class=${TIME_CLS} value=${e.minute} onInput=${up('minute')} />
                  <span class="text-sm font-semibold text-faint">:</span>
                  <input type="number" min="0" max="59" inputmode="numeric" class=${TIME_CLS} value=${e.second} onInput=${up('second')} />
                  <select class="picker flex-1" value=${e.ampm} onChange=${up('ampm')}><option value="AM">AM</option><option value="PM">PM</option></select>
                </div>
              </div>
            </div>

            <div class="rounded-2xl border border-line/70 bg-surface p-4 space-y-3 mb-6">
              <div>
                <label class="block text-xs font-medium text-muted mb-1.5">Duration</label>
                <div class="flex items-center gap-2">
                  <div class="flex items-center gap-1.5 flex-1"><input type="number" min="0" inputmode="numeric" class=${NUM_CLS} value=${e.durMin} onInput=${up('durMin')} /><span class="text-sm text-muted">min</span></div>
                  <div class="flex items-center gap-1.5 flex-1"><input type="number" min="0" max="59" inputmode="numeric" class=${NUM_CLS} value=${e.durSec} onInput=${up('durSec')} /><span class="text-sm text-muted">sec</span></div>
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-muted mb-2">Intensity</label>
                <div class="flex items-center gap-4">
                  ${[1, 2, 3].map((l) => {
                    const sel = l === e.level;
                    const cls = sel
                      ? 'text-white ' + LEVELS[l].fill.split(' ')[0] + ' ring-2 ring-offset-2 ' + LEVELS[l].ring
                      : 'text-body bg-card border border-line';
                    return html`<button aria-label=${LEVELS[l].label} onClick=${() => this.setEdit({ level: l })}
                      class=${'h-11 w-11 grid place-items-center rounded-full text-xl transition ' + cls}>
                      <${Icon} name=${LEVELS[l].icon} class="text-xl" />
                    </button>`;
                  })}
                </div>
              </div>
            </div>

            <button onClick=${this.saveEdit} class=${'w-full ' + BTN_PRIMARY}>${e.isNew ? 'Add contraction' : 'Save changes'}</button>
          </div>
        <//>`;
      }

      renderSettings() {
        const n = this.state.archives.length;
        return html`<${Modal} z="z-40" onClose=${() => this.setState({ modal: null })}>
          <div class=${PANEL + ' p-6'} style=${PANEL_PAD}>
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-base font-bold tracking-tight">Settings</h3>
              <button onClick=${() => this.setState({ modal: null })} class="grid place-items-center h-9 w-9 rounded-lg text-muted hover:text-ink hover:bg-surface transition"><${Icon} name="xmark" class="text-xl" /></button>
            </div>
            <div class="space-y-2">
              <${SettingsRow} icon="upload" title="Export data" sub="Save a backup file or share it" onClick=${this.exportData} />
              <${SettingsRow} icon="copy" title="Copy summary" sub=${this.state.copied ? 'Copied!' : 'For pasting into Sheets or a message'} onClick=${this.copySummary} />
              <${SettingsRow} icon="download" title="Import data" sub="Restore from a backup file" onClick=${() => this.fileInput && this.fileInput.click()} />
              <${SettingsRow} icon="archive" title="Archive current session" sub="Save these to a group and start fresh" onClick=${this.askArchive} />
              <${SettingsRow} icon="folder" title="Archived sessions" sub=${n ? `${n} group${n > 1 ? 's' : ''} saved` : 'View past groups'} onClick=${() => this.setState({ modal: 'archive' })} />
              <${SettingsRow} icon="trash" title="Clear all data" sub="Delete all recorded contractions" danger onClick=${this.askClear} />
              <input type="file" accept="application/json,.json" class="hidden" ref=${(el) => (this.fileInput = el)} onChange=${this.onImportFile} />
            </div>
          </div>
        <//>`;
      }

      renderArchive() {
        const groups = this.state.archives;
        return html`<${Modal} z="z-40" onClose=${() => this.setState({ modal: null })}>
          <div class=${PANEL + ' flex flex-col max-h-[85vh]'}>
            <div class="flex items-center justify-between p-6 pb-3 shrink-0">
              <h3 class="text-base font-bold tracking-tight">Archived sessions</h3>
              <button onClick=${() => this.setState({ modal: null })} class="grid place-items-center h-9 w-9 rounded-lg text-muted hover:text-ink hover:bg-surface transition"><${Icon} name="xmark" class="text-xl" /></button>
            </div>
            <div class="overflow-y-auto px-6 pb-6 space-y-5" style=${PANEL_PAD}>
              ${!groups.length
                ? html`<p class="text-sm text-muted text-center py-8">No archived sessions yet.</p>`
                : groups.map((g) => {
                    const items = [...g.items].sort((a, b) => b.start - a.start);
                    return html`<div key=${g.id}>
                      <div class="flex items-center justify-between mb-2">
                        <div class="text-sm font-semibold text-body">${fmtArchiveDate(g.archivedAt)}</div>
                        <div class="flex items-center gap-1.5">
                          <span class="text-xs text-faint">${g.items.length} total</span>
                          <button aria-label="Delete this archived group" onClick=${() => this.deleteArchive(g.id)} class=${'h-7 w-7 ' + ICON_BTN}><${Icon} name="trash" class="text-base" /></button>
                        </div>
                      </div>
                      <div class="space-y-1.5">
                        ${items.map((c, i) => {
                          const color = (LEVELS[c.intensity] || LEVELS[1]).fill.split(' ')[0];
                          return html`<div key=${c.start} class="flex items-center gap-3 rounded-xl bg-surface px-3 py-2">
                            <span class="tnum text-xs font-semibold text-faint shrink-0">${String(items.length - i).padStart(2, '0')}</span>
                            <span class="tnum font-semibold text-ink flex-1">${fmtDur(c.end - c.start)}</span>
                            <span class=${'h-2 w-2 rounded-full shrink-0 ' + color}></span>
                            <span class="text-xs text-muted shrink-0">${fmtTime(c.start)}</span>
                          </div>`;
                        })}
                      </div>
                    </div>`;
                  })}
            </div>
          </div>
        <//>`;
      }

      renderInfo() {
        const i = INFO[this.state.infoKey];
        if (!i) return null;
        return html`<${Modal} z="z-50" onClose=${() => this.setState({ modal: null })}>
          <div class=${PANEL + ' p-6'} style=${PANEL_PAD}>
            <div class="flex items-center justify-between mb-3">
              <h3 class="text-base font-bold tracking-tight">${i.title}</h3>
              <button onClick=${() => this.setState({ modal: null })} class="grid place-items-center h-9 w-9 rounded-lg text-muted hover:text-ink hover:bg-surface transition"><${Icon} name="xmark" class="text-xl" /></button>
            </div>
            <p class="text-sm text-body leading-relaxed">${i.body}</p>
          </div>
        <//>`;
      }

      renderConfirm() {
        const c = this.state.confirm;
        return html`<${Modal} z="z-50" onClose=${this.closeConfirm}>
          <div class=${PANEL + ' p-6'} style=${PANEL_PAD}>
            <h3 class="text-base font-bold tracking-tight">${c.title}</h3>
            <p class="text-sm text-muted mt-1.5">${c.message || ''}</p>
            <div class="flex gap-3 mt-6">
              <button onClick=${this.closeConfirm} class=${'flex-1 ' + BTN_OUTLINE}>Cancel</button>
              <button onClick=${() => { const cb = c.onOk; this.closeConfirm(); cb && cb(); }} class=${'flex-1 ' + BTN_PRIMARY}>${c.okLabel || 'Delete'}</button>
            </div>
          </div>
        <//>`;
      }

      render() {
        const { activeStart, selectedIntensity, modal, confirm } = this.state;
        const st = recentStats(this.state.contractions);
        const timing = activeStart != null;

        return [
          html`<div class="mx-auto max-w-md px-4 pb-28 pt-6 space-y-6">
            <header class="flex items-center justify-between">
              <div>
                <h1 class="text-lg font-bold tracking-tight leading-none">Contraction Timer</h1>
                <p class="text-xs text-muted mt-0.5">Track labor, simply</p>
              </div>
              <div class="flex items-center">
                <button title="Toggle light/dark" aria-label="Toggle light or dark theme" onClick=${this.toggleTheme} class="grid place-items-center h-10 w-9 rounded-xl text-muted hover:text-ink hover:bg-surface transition"><${Icon} name=${this.state.theme === 'dark' ? 'sun-light' : 'half-moon'} class="text-xl" /></button>
                <button title="Add a contraction" onClick=${this.openAdd} class="grid place-items-center h-10 w-9 rounded-xl text-muted hover:text-ink hover:bg-surface transition"><${Icon} name="plus" class="text-xl" /></button>
                <button title="Settings" onClick=${() => this.setState({ modal: 'settings' })} class="grid place-items-center h-10 w-9 rounded-xl text-muted hover:text-ink hover:bg-surface transition"><${Icon} name="settings" class="text-xl" /></button>
              </div>
            </header>

            ${check511(st) ? html`<div class="rounded-2xl border border-brand-200 bg-brand-50 p-4">
              <div class="flex items-start gap-3">
                <span class="grid place-items-center h-9 w-9 shrink-0 rounded-xl bg-brand-500 text-white text-xl"><${Icon} name="hospital-circle" /></span>
                <div>
                  <p class="font-semibold text-brand-700 leading-tight">Time to call your provider</p>
                  <p class="text-sm text-brand-600/90 mt-1">Your contractions match the 5-1-1 pattern — about 5 min apart, lasting ~1 min, for over an hour.</p>
                </div>
              </div>
            </div>` : null}

            ${this.renderStats(st)}
            ${this.renderHistory()}

            <p class="text-center text-[11px] text-muted leading-relaxed">
              This tool is for tracking only and is not medical advice.<br/>Always follow your provider's guidance.
            </p>
          </div>`,

          html`<div class="fixed inset-x-0 bottom-0 z-20 border-t border-line/70 bg-card/80 backdrop-blur supports-[backdrop-filter]:bg-card/65" style="padding-bottom: env(safe-area-inset-bottom);">
            <div class="mx-auto max-w-md px-4 py-3 flex items-center gap-3">
              <button onClick=${this.toggle} class=${'flex-1 flex items-center justify-center gap-2 ' + BTN_PRIMARY}>
                <span>${timing ? 'Stop' : 'Start contraction'}</span>
                ${timing ? html`<span class="tnum">${fmtClock(this.state.elapsed)}</span>` : null}
              </button>
              <button aria-label=${'Intensity: ' + LEVELS[selectedIntensity].label + '. Tap to change.'} onClick=${this.cycleIntensity}
                class=${'shrink-0 h-16 w-16 grid place-items-center rounded-full text-white text-3xl shadow-sm active:scale-[.97] transition ' + LEVELS[selectedIntensity].fill.split(' ')[0]}>
                <${Icon} name=${LEVELS[selectedIntensity].icon} class="text-3xl" />
              </button>
            </div>
          </div>`,

          modal === 'edit' ? this.renderEdit() : null,
          modal === 'settings' ? this.renderSettings() : null,
          modal === 'archive' ? this.renderArchive() : null,
          modal === 'info' ? this.renderInfo() : null,
          confirm ? this.renderConfirm() : null,
        ];
      }
    }

    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
