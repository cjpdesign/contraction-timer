<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f5" />
  <script>
    // Apply the saved (or system) theme before paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem('contraction-timer.theme');
        if (t !== 'light' && t !== 'dark') t = 'light';   // default to light; dark only via the toggle
        document.documentElement.dataset.theme = t;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = t === 'dark' ? '#0a0a0a' : '#f5f5f5';
      } catch (e) {}
    })();
  </script>
  <title>Contraction Timer</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./logo.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Contractions" />
  <meta name="description" content="Track labor contractions and the 5-1-1 pattern. Private, works offline." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contraction Timer" />
  <meta property="og:description" content="Track labor contractions and the 5-1-1 pattern. Private, works offline." />
  <meta property="og:url" content="https://cjpdesign.github.io/contraction-timer/" />
  <meta property="og:image" content="https://cjpdesign.github.io/contraction-timer/logo.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Contraction Timer" />
  <meta name="twitter:description" content="Track labor contractions and the 5-1-1 pattern. Private, works offline." />
  <meta name="twitter:image" content="https://cjpdesign.github.io/contraction-timer/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="min-h-screen bg-page text-ink font-sans antialiased">
  <div id="app"></div>

  <script>
    // Register the service worker for offline support (only works over http(s), not file://).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>

  <script type="module" src="./script.js"></script>
</body>
</html>
